name = "goofish-agent-worker"
main = "src/index.js"
compatibility_date = "2026-03-08"

# 域名配置
[[routes]]
pattern = "goofish-agent-worker.wgy.us.kg"
custom_domain = true

# Durable Objects 配置
[[durable_objects.bindings]]
name = "MESSAGE_PUBSUB"
class_name = "MessagePubSub"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["MessagePubSub"]

# Queue 配置
[[queues.producers]]
queue = "message-queue"
binding = "MESSAGE_QUEUE"

[[queues.consumers]]
queue = "message-queue"
max_batch_size = 10
max_batch_timeout = 30

# 环境变量（非敏感信息）
[vars]
DEBUG_MODE = "false"

# 敏感信息使用 wrangler secret put 设置
# wrangler secret put API_KEY
# wrangler secret put TELEGRAM_BOT_TOKEN
# wrangler secret put TELEGRAM_CHAT_ID

# 开发环境配置
[env.dev]
name = "goofish-agent-worker-dev"

# 生产环境配置
[env.production]
name = "goofish-agent-worker"

# 日志配置
[observability]
[observability.logs]
enabled = true
invocation_logs = true