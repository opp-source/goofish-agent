name = "goofish-agent-worker"
main = "src/index.js"
compatibility_date = "2026-03-08"

# Durable Objects 配置
[[durable_objects.bindings]]
name = "MESSAGE_PUBSUB"
class_name = "MessagePubSub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MessagePubSub"]

# KV Namespace 配置
# 运行 wrangler kv:namespace create GOOFISH_KV 后替换下面的 ID
[[kv_namespaces]]
binding = "GOOFISH_KV"
id = "65b632e92d1b4c05ab8620f091572989"

# 定时任务 - 每分钟检查心跳
[triggers]
crons = ["* * * * *"]

# 环境变量（非敏感信息）
[vars]
DEBUG_MODE = "false"

# 敏感信息使用 wrangler secret put 设置
# wrangler secret put API_KEY
# wrangler secret put TELEGRAM_BOT_TOKEN
# wrangler secret put TELEGRAM_CHAT_ID

# 开发环境配置
[env.dev]
name = "goofish-agent-worker-dev"

# 生产环境配置
[env.production]
name = "goofish-agent-worker"
